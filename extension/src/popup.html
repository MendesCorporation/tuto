<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Tuto Recorder</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f10;
      color: #fff;
    }
    .header {
      padding: 16px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo {
      width: 24px;
      height: 24px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 6px;
    }
    h1 { font-size: 14px; font-weight: 600; }
    .content { padding: 16px; }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      font-size: 13px;
      color: #888;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #444;
    }
    .dot.recording {
      background: #ef4444;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .step-count {
      font-size: 12px;
      color: #666;
      margin-bottom: 16px;
    }
    input {
      width: 100%;
      padding: 8px 12px;
      background: #1a1a1b;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-size: 13px;
      margin-bottom: 12px;
      outline: none;
    }
    input:focus { border-color: #6366f1; }
    input::placeholder { color: #555; }
    button {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-start {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
    }
    .btn-start:hover { opacity: 0.9; }
    .btn-stop {
      background: #ef4444;
      color: #fff;
    }
    .btn-stop:hover { background: #dc2626; }
    .saved-msg {
      margin-top: 12px;
      padding: 10px;
      background: #052e16;
      border: 1px solid #166534;
      border-radius: 8px;
      font-size: 12px;
      color: #4ade80;
      display: none;
    }
    .saved-msg a {
      color: #86efac;
      text-decoration: underline;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo"></div>
    <h1>Tuto Recorder</h1>
  </div>
  <div class="content">
    <div class="status">
      <div class="dot" id="dot"></div>
      <span id="status-text">Ready to record</span>
    </div>
    <div class="step-count" id="step-count"></div>
    <input type="text" id="title-input" placeholder="Recording title (optional)" />
    <button class="btn-start" id="main-btn">Start Recording</button>
    <div class="saved-msg" id="saved-msg">
      Recording saved! <a id="view-link">View demo &rarr;</a>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
